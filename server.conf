# =====================================================================
# RA OpenVPN — server.conf
# For OpenVPN 2.6.x on Debian 12 in Docker (d3vilh/openvpn-server:2.6.14)
# Design summary in README.md
# =====================================================================

# ---------------------------------------------------------------------
# Listening
# ---------------------------------------------------------------------
# Container-side port (host maps 1195 -> 1194 via docker-compose)
port 1194
proto tcp-server
dev tun
topology subnet

# ---------------------------------------------------------------------
# Certificates and keys (auto-generated by d3vilh entrypoint on first run)
# ---------------------------------------------------------------------
ca        /etc/openvpn/pki/ca.crt
cert      /etc/openvpn/pki/issued/server.crt
key       /etc/openvpn/pki/private/server.key
dh        /etc/openvpn/pki/dh.pem
tls-crypt /etc/openvpn/pki/ta.key

# ---------------------------------------------------------------------
# VPN tunnel network — must match RA_VPN_CLIENT_SUBNET in .env
# ---------------------------------------------------------------------
server 10.99.99.0 255.255.255.0

# Persist client IP assignments across reconnects
ifconfig-pool-persist /etc/openvpn/config/ipp.txt

# ---------------------------------------------------------------------
# Split-tunnel routes — only these subnets go through the VPN
# ---------------------------------------------------------------------
push "route 192.168.5.0 255.255.255.0"
push "route 192.168.6.0 255.255.255.0"
push "route 192.168.7.0 255.255.255.0"

# Optional DNS pushed to clients (uncomment for lab-internal DNS)
;push "dhcp-option DNS 192.168.5.1"

# NO redirect-gateway — this is split-tunnel by design.
;push "redirect-gateway def1 bypass-dhcp"

# ---------------------------------------------------------------------
# TLS & crypto (modern, OpenVPN 2.6-compliant)
# ---------------------------------------------------------------------
# Server-side negotiable data-channel ciphers (AEAD only)
data-ciphers AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305
data-ciphers-fallback AES-256-GCM

# Control channel auth
auth SHA256

# Enforce TLS 1.2+ (2.6 default, explicit for clarity)
tls-version-min 1.2

# Server role (mandatory in 2.7+, explicit here for forward compat)
tls-server

# Require valid client certificate signed by our CA
remote-cert-tls client
verify-client-cert require

# ---------------------------------------------------------------------
# Session behavior
# ---------------------------------------------------------------------
# Renegotiate TLS keys every hour (default is 1h — explicit for clarity)
reneg-sec 3600

# Ping every 10s; consider peer dead after 60s
keepalive 10 60

# One connection per certificate. Comment out only for testing.
;duplicate-cn

# ---------------------------------------------------------------------
# Compression disabled (VORACLE attack; removed in future OpenVPN)
# ---------------------------------------------------------------------
;compress
;allow-compression no

# ---------------------------------------------------------------------
# Persistence & privilege drop
# ---------------------------------------------------------------------
persist-key
persist-tun
user  nobody
group nogroup

# ---------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------
status      /var/log/openvpn/openvpn-status.log 30
log-append  /var/log/openvpn/openvpn.log
verb 3
mute 20

# ---------------------------------------------------------------------
# Miscellaneous
# ---------------------------------------------------------------------
# 0 = do not send explicit-exit to peers (safer with NAT/firewalls)
explicit-exit-notify 0

# Do NOT allow VPN clients to talk to each other on the tunnel
;client-to-client

# Directory for per-client static configs (fixed IPs, custom routes)
client-config-dir /etc/openvpn/staticclients

# Management interface (used by openvpn-ui to send reload signals)
management 0.0.0.0 2080